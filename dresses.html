<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namasvi Fashion Studio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#fff9fb;
}

header{
    background:#ff4f81;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h2{
    margin-bottom:20px;
}

.size-buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.size-btn{
    padding:12px 25px;
    background:#fff;
    border:2px solid #ff4f81;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.size-btn:hover{
    background:#ff4f81;
    color:white;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#ff4f81;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

.fabric{
    margin-bottom:15px;
}

.order-btn{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:25px;
}
</style>
</head>
<body>

<header>
    <h1>Namasvi Fashion Studio</h1>
</header>

<div class="container">

    <h2>Select Size Category</h2>

    <div class="size-buttons">
        <button class="size-btn" onclick="showProducts('M')">M</button>
        <button class="size-btn" onclick="showProducts('L')">L</button>
        <button class="size-btn" onclick="showProducts('XL')">XL</button>
        <button class="size-btn" onclick="showProducts('XXL')">XXL</button>
        <button class="size-btn" onclick="showProducts('XXXL')">XXXL</button>
        <button class="size-btn" onclick="showProducts('4XL')">4XL</button>
    </div>

    <div class="products" id="productContainer">
        <h3>Please select a size category</h3>
    </div>

</div>

<script>

const dresses = {

M: [
{
name:"Pink Silk Kurti",
price:"₹1,499",
fabric:"Premium Silk",
image:"https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=800"
},
{
name:"Designer Saree",
price:"₹1,799",
fabric:"Banarasi Silk",
image:"https://images.unsplash.com/photo-1583391733981-849b4cdd1c4f?w=800"
}
],

L: [
{
name:"Party Wear Gown",
price:"₹2,299",
fabric:"Georgette",
image:"https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=800"
}
],

XL: [
{
name:"Embroidered Suit",
price:"₹1,999",
fabric:"Cotton Silk",
image:"https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=800"
}
],

XXL: [
{
name:"Wedding Saree",
price:"₹3,499",
fabric:"Kanjivaram Silk",
image:"https://images.unsplash.com/photo-1583391733981-849b4cdd1c4f?w=800"
}
],

XXXL: [
{
name:"Festive Lehenga",
price:"₹4,999",
fabric:"Velvet",
image:"https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=800"
}
],

"4XL": [
{
name:"Designer Anarkali",
price:"₹2,999",
fabric:"Net & Silk",
image:"https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=800"
}
]
};

function showProducts(size){

let html = "";

dresses[size].forEach(item => {

html += `
<div class="card">

<img src="${item.image}">

<div class="card-content">
    <h3>${item.name}</h3>

    <div class="price">${item.price}</div>

    <div class="fabric">
        <b>Fabric:</b> ${item.fabric}
    </div>

    <a class="order-btn"
    href="https://wa.me/919876543210?text=I want to order ${item.name}">
    Order Now
    </a>
</div>

</div>
`;
});

document.getElementById("productContainer").innerHTML = html;
}

</script>

</body>
</html>
